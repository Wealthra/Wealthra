version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from 89.167.80.182.nip.io --to http://api:8080
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    container_name: wealthra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wealthra_user
      POSTGRES_PASSWORD: YourStrongDbPassword123!
      POSTGRES_DB: wealthra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: ghcr.io/wealthra/wealthra-api:latest 
    container_name: wealthra_api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=wealthra_db;Username=wealthra_user;Password=YourStrongDbPassword123!
      - JwtSettings__Secret=REPLACE_THIS_WITH_A_SUPER_SECRET_KEY_AT_LEAST_32_CHARS_LONG
      - JwtSettings__Issuer=WealthraApi
      - JwtSettings__Audience=WealthraApp
      - JwtSettings__ExpiryMinutes=60
    depends_on:
      - db
    volumes:
      - aspnet_keys:/root/.aspnet/DataProtection-Keys

volumes:
  postgres_data:
  aspnet_keys:
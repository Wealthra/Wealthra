services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from api.wealthra.cloud --to http://api:8080
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg15
    container_name: wealthra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wealthra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-wealthra_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Production: set WEALTHRA_*_IMAGE in .env (see deploy workflow). Runtime uses pre-built images only.
  # Local builds: docker-compose.local.yaml builds from ./wealthra-ocr and ./wealthra-stt in this repo.
  api:
    image: ${WEALTHRA_API_IMAGE:?Set WEALTHRA_API_IMAGE in .env (registry image, e.g. ghcr.io/org/wealthra-api:latest)}
    container_name: wealthra_api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-wealthra_db};Username=${POSTGRES_USER:-wealthra_user};Password=${POSTGRES_PASSWORD}
      - JwtSettings__Secret=${JWT_SETTINGS_SECRET:?Set JWT_SETTINGS_SECRET in .env (see .env.example)}
      - JwtSettings__Issuer=WealthraApi
      - JwtSettings__Audience=WealthraApp
      - JwtSettings__ExpiryMinutes=60
      - ExtractionServices__OcrBaseUrl=http://ocr:8000/
      - ExtractionServices__SttBaseUrl=http://stt:8000/
      - ExtractionServices__CopilotBaseUrl=http://copilot:8000/
      - ExtractionServices__TimeoutSeconds=120
      - Groq__ApiKey=${GROQ_API_KEY:?Set GROQ_API_KEY in .env (see .env.example)}
    depends_on:
      - db
      - ocr
      - stt
      - copilot
    volumes:
      - aspnet_keys:/root/.aspnet/DataProtection-Keys

  ocr:
    image: ${WEALTHRA_OCR_IMAGE:?Set WEALTHRA_OCR_IMAGE in .env (registry image for the Python OCR service)}
    container_name: wealthra_ocr
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}

  stt:
    image: ${WEALTHRA_STT_IMAGE:?Set WEALTHRA_STT_IMAGE in .env (registry image for the STT service)}
    container_name: wealthra_stt
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}

  copilot:
    image: ${WEALTHRA_COPILOT_IMAGE:?Set WEALTHRA_COPILOT_IMAGE in .env (registry image for the Copilot service)}
    container_name: wealthra_copilot
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wealthra_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wealthra_db}
    depends_on:
      - db

volumes:
  postgres_data:
  aspnet_keys:

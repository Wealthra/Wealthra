name: Deploy API to Hetzner

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Must match what the server `.env` sets as WEALTHRA_*_IMAGE (see Deploy step).
      API_IMAGE: ghcr.io/wealthra/wealthra-api:latest
      OCR_IMAGE: ghcr.io/wealthra/wealthra-ocr:latest
      STT_IMAGE: ghcr.io/wealthra/wealthra-stt:latest
      COPILOT_IMAGE: ghcr.io/wealthra/wealthra-copilot:latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout monorepo (API + wealthra-ocr + wealthra-stt)
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}

      - name: Build and Push OCR Image
        uses: docker/build-push-action@v5
        with:
          context: ./wealthra-ocr
          file: ./wealthra-ocr/Dockerfile
          push: true
          tags: ${{ env.OCR_IMAGE }}

      - name: Build and Push STT Image
        uses: docker/build-push-action@v5
        with:
          context: ./wealthra-stt
          file: ./wealthra-stt/Dockerfile
          push: true
          tags: ${{ env.STT_IMAGE }}

      - name: Build and Push Copilot Image
        uses: docker/build-push-action@v5
        with:
          context: ./wealthra-copilot
          file: ./wealthra-copilot/Dockerfile
          push: true
          tags: ${{ env.COPILOT_IMAGE }}

      - name: Copy docker-compose to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,Caddyfile"
          target: "/root/wealthra-backend"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SETTINGS_SECRET: ${{ secrets.JWT_SETTINGS_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SETTINGS_SECRET,GROQ_API_KEY,Smtp__Host,Smtp__Port,Smtp__UseSsl,Smtp__Tls,Smtp__Username,Smtp__Password,Smtp__FromEmail,Smtp__FromName
          script: |
            set -euo pipefail
            cd /root/wealthra-backend
            umask 077
            printf '%s\n' \
              "POSTGRES_USER=wealthra_user" \
              "POSTGRES_DB=wealthra_db" \
              "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
              "JWT_SETTINGS_SECRET=${JWT_SETTINGS_SECRET}" \
              "GROQ_API_KEY=${GROQ_API_KEY}" \
              "WEALTHRA_API_IMAGE=${{ env.API_IMAGE }}" \
              "WEALTHRA_OCR_IMAGE=${{ env.OCR_IMAGE }}" \
              "WEALTHRA_STT_IMAGE=${{ env.STT_IMAGE }}" \
              "WEALTHRA_COPILOT_IMAGE=${{ env.COPILOT_IMAGE }}" \
              "Smtp__Host=${Smtp__Host:-}" \
              "Smtp__Port=${Smtp__Port:-587}" \
              "Smtp__UseSsl=${Smtp__UseSsl:-false}" \
              "Smtp__Tls=${Smtp__Tls:-}" \
              "Smtp__Username=${Smtp__Username:-}" \
              "Smtp__Password=${Smtp__Password:-}" \
              "Smtp__FromEmail=${Smtp__FromEmail:-}" \
              "Smtp__FromName=${Smtp__FromName:-Wealthra}" \
              > .env
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull api ocr stt copilot
            docker compose up -d
            docker system prune -f
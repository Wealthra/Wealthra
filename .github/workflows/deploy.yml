name: Deploy API to Hetzner

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Must match what the server uses in `.env` as WEALTHRA_API_IMAGE (see Deploy step).
      API_IMAGE: ghcr.io/wealthra/wealthra-api:latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}

      - name: Copy docker-compose to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,Caddyfile"
          target: "/root/wealthra-backend"

      - name: Deploy on Server
        uses: appleboy/ssh-action@master
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SETTINGS_SECRET: ${{ secrets.JWT_SETTINGS_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SETTINGS_SECRET,GROQ_API_KEY
          script: |
            set -euo pipefail
            cd /root/wealthra-backend
            umask 077
            printf '%s\n' \
              "POSTGRES_USER=wealthra_user" \
              "POSTGRES_DB=wealthra_db" \
              "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
              "JWT_SETTINGS_SECRET=${JWT_SETTINGS_SECRET}" \
              "GROQ_API_KEY=${GROQ_API_KEY}" \
              "WEALTHRA_API_IMAGE=${{ env.API_IMAGE }}" \
              > .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull api
            docker compose up -d
            docker system prune -f
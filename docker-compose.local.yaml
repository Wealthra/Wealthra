services:
  db:
    image: pgvector/pgvector:pg15
    container_name: wealthra_db_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: wealthra_user
      POSTGRES_PASSWORD: YourStrongDbPassword123!
      POSTGRES_DB: wealthra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: wealthra-api:local
    container_name: wealthra_api_local
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=wealthra_db;Username=wealthra_user;Password=YourStrongDbPassword123!
      - JwtSettings__Secret=REPLACE_THIS_WITH_A_SUPER_SECRET_KEY_AT_LEAST_32_CHARS_LONG
      - JwtSettings__Issuer=WealthraApi
      - JwtSettings__Audience=WealthraApp
      - JwtSettings__ExpiryMinutes=60
      - ExtractionServices__OcrBaseUrl=http://ocr:8000/
      - ExtractionServices__SttBaseUrl=http://stt:8000/
      - ExtractionServices__CopilotBaseUrl=http://copilot:8000/
      - ExtractionServices__TimeoutSeconds=120
      - Groq__ApiKey=${GROQ_API_KEY}
      - Groq__Model=${GROQ_MODEL:-openai/gpt-oss-120b}
      - Smtp__Host=${Smtp_Host:-}
      - Smtp__Port=${Smtp_Port:-587}
      - Smtp__UseSsl=${Smtp_UseSsl:-false}
      - Smtp__Tls=${Smtp_Tls:-}
      - Smtp__Username=${Smtp_Username:-}
      - Smtp__Password=${Smtp_Password:-}
      - Smtp__FromEmail=${Smtp_FromEmail:-}
      - Smtp__FromName=${Smtp_FromName:-Wealthra}
    depends_on:
      - db
      - ocr
      - stt
      - copilot
    ports:
      - "8080:8080"
    volumes:
      - aspnet_keys_local:/root/.aspnet/DataProtection-Keys

  ocr:
    build:
      context: ./wealthra-ocr
      dockerfile: Dockerfile
    image: wealthra-ocr:local
    container_name: wealthra_ocr_local
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OCR_MODEL=${OCR_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
    ports:
      - "8001:8000"

  stt:
    build:
      context: ./wealthra-stt
      dockerfile: Dockerfile
    image: wealthra-stt:local
    container_name: wealthra_stt_local
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - STT_AUDIO_MODEL=${STT_AUDIO_MODEL:-whisper-large-v3-turbo}
      - STT_LLM_MODEL=${STT_LLM_MODEL:-openai/gpt-oss-120b}
    ports:
      - "8002:8000"

  copilot:
    build:
      context: ./wealthra-copilot
      dockerfile: Dockerfile
    image: wealthra-copilot:local
    container_name: wealthra_copilot_local
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgresql://wealthra_user:YourStrongDbPassword123!@db:5432/wealthra_db
      - MODEL_FAST=${COPILOT_MODEL_FAST:-qwen/qwen3-32b}
      - MODEL_REASONING=${COPILOT_MODEL_REASONING:-groq/compound}
    depends_on:
      - db
    ports:
      - "8003:8000"

volumes:
  postgres_data_local:
  aspnet_keys_local:

